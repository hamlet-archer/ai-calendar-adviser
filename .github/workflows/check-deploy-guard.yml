name: check-deploy-guard

# B8.3 (AP-8) — structural CI guard that fails any PR which removes
# scripts/pull-deploy.sh's load-bearing invariants.
#
# ai-calendar-adviser uses a split deploy: the puller (scripts/pull-deploy.sh)
# lives in this repo and is self-installed onto the VPS at
# /opt/ai-calendar-adviser-deploy/pull-deploy.sh, but the heavy-lifting
# deploy script (/opt/ai-calendar-adviser-deploy/deploy.sh) does NOT live
# in this repo — it's a VPS-side artifact installed out-of-band. Because
# of that, B8.3 cannot mirror B8.2's "grep scripts/deploy.sh for git reset"
# guard verbatim; the actual reset happens in a file that isn't here to
# check.
#
# What CAN be guarded is the puller's contribution to the deploy
# contract — three structural invariants whose silent removal would
# turn pull-deploy back into the silent-failure surface N15 + N17 just
# closed:
#
#   1. `set -euo pipefail` — fail-loud bash mode. Without this, an
#      intermediate command failing mid-tick (git fetch, install,
#      systemctl probe) gets swallowed and the puller keeps running on
#      stale state.
#   2. Self-install via `install -m 755 ... "$STABLE_PATH"` (the N17
#      fix). Without this, the stable puller copy never updates and
#      every code-change deploy that tripped over deploy.sh's prior
#      EACCES couldn't ship the new puller.
#   3. `exit $deploy_status` — propagate deploy.sh's exit code. Without
#      this, a deploy failure is treated as success and the next
#      cycle's deploy-verification sweep marks the row [x] when prod
#      is still on the old code.
#
# Same blast-radius semantics as B8.1 / B8.2 (deployed code MUST match
# a committed HEAD on origin/main + every layer of the deploy chain
# fail-loud on error); different mechanical signatures because the
# script being guarded is the puller, not the resetter.
#
# Reading: https://github.com/hamlet-archer/ai-ops-meta/blob/main/architect-backlog.md#b8

on:
  pull_request:
    paths:
      - 'scripts/pull-deploy.sh'
      - 'scripts/lib/deploy-tick-invariant.sh'
      - '.github/workflows/check-deploy-guard.yml'
  push:
    branches: [main]
    paths:
      - 'scripts/pull-deploy.sh'
      - 'scripts/lib/deploy-tick-invariant.sh'
      - '.github/workflows/check-deploy-guard.yml'

jobs:
  no-silent-puller-failure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify scripts/pull-deploy.sh exists
        run: |
          test -f scripts/pull-deploy.sh || {
            echo "::error::scripts/pull-deploy.sh missing — B8.3 (AP-8) requires the in-repo puller"
            exit 1
          }

      - name: Verify scripts/pull-deploy.sh fails loud + self-installs + propagates deploy exit code
        run: |
          if ! grep -qE 'set -euo pipefail' scripts/pull-deploy.sh; then
            echo "::error file=scripts/pull-deploy.sh::B8.3 (AP-8) guard removed — pull-deploy.sh no longer enables 'set -euo pipefail'"
            echo "  rationale: without fail-loud bash, intermediate failures (git fetch, install, systemctl probe) get swallowed and the puller keeps running on stale state."
            echo "  see: https://github.com/hamlet-archer/ai-ops-meta/blob/main/architect-backlog.md#b8"
            exit 1
          fi
          if ! grep -qE 'install -m 755 .* "\$STABLE_PATH"' scripts/pull-deploy.sh; then
            echo "::error file=scripts/pull-deploy.sh::B8.3 (AP-8) guard removed — pull-deploy.sh no longer self-installs the stable copy via 'install -m 755 ... \"\$STABLE_PATH\"'"
            echo "  rationale: this is the N17 fix; without it, the stable puller copy on the VPS never updates and code-change deploys that tripped over deploy.sh's prior EACCES couldn't ship the new puller."
            echo "  see: https://github.com/hamlet-archer/ai-ops-meta/blob/main/architect-backlog.md#n17"
            exit 1
          fi
          if ! grep -qE 'exit \$deploy_status' scripts/pull-deploy.sh; then
            echo "::error file=scripts/pull-deploy.sh::B8.3 (AP-8) guard removed — pull-deploy.sh no longer propagates deploy.sh's exit code via 'exit \$deploy_status'"
            echo "  rationale: without this, a deploy failure is treated as success and the next sweep marks the backlog row [x] when prod is still on the old code."
            exit 1
          fi
          echo "B8.3 guard verified: scripts/pull-deploy.sh sets -euo pipefail + self-installs via install -m 755 + propagates deploy exit code."

      - name: Verify scripts/pull-deploy.sh has the B8.10.3 post-daemon-reload drift check
        # B8.10.3 — pins the post-daemon-reload drift check against silent
        # removal. The check lives in pull-deploy.sh (not scripts/deploy.sh
        # like in ai-comms-adviser) because ai-calendar-adviser's deploy.sh
        # is a VPS-side artifact not tracked in this repo. Greps for the
        # structural signatures: systemctl cat (source of truth for running
        # unit text), tail -n +2 (header strip), and a FAILED exit-1 path.
        run: |
          if ! grep -qE 'systemctl.* cat|\$SYSTEMCTL_BIN" cat' scripts/pull-deploy.sh; then
            echo "::error file=scripts/pull-deploy.sh::B8.10.3 guard removed — drift check no longer uses 'systemctl cat'"
            echo "  rationale: the running systemd view is the source of truth for the post-daemon-reload comparison."
            echo "  see: https://github.com/hamlet-archer/ai-ops-meta/blob/main/architect-backlog.md#b8103"
            exit 1
          fi
          if ! grep -qE 'tail -n \+2' scripts/pull-deploy.sh; then
            echo "::error file=scripts/pull-deploy.sh::B8.10.3 guard removed — drift check no longer strips the systemctl-cat header"
            echo "  rationale: without the header strip every unit appears drifted."
            exit 1
          fi
          if ! grep -qiE 'drift.*FAILED|drift_ok|drift check' scripts/pull-deploy.sh; then
            echo "::error file=scripts/pull-deploy.sh::B8.10.3 guard removed — drift check has no FAILED exit-1 path"
            echo "  rationale: the check must surface drift via deploy_status=1, not just log a warning."
            exit 1
          fi
          echo "B8.10.3 guard verified: scripts/pull-deploy.sh runs the post-daemon-reload drift check."

      - name: Verify the deploy-tick invariant helper + its wiring (W9)
        # W9 — scripts/lib/deploy-tick-invariant.sh now carries the production
        # "daemon-must-be-active after every deploy tick" recovery invariant
        # (R4.b). It is sourced from scripts/pull-deploy.sh via
        # source_invariant_lib and called at the deploy site. Before W9 this
        # workflow neither triggered on edits to the helper (it wasn't in the
        # paths: filter) nor validated the sourcing wiring — so a PR that
        # weakened or deleted the helper alone could merge without the guard
        # ever running, re-opening the 2026-05-27 silent-dead-daemon outage
        # class (W6/R4.b). Guard BOTH the puller's wiring of the helper AND
        # the helper's own recovery signatures.
        run: |
          LIB=scripts/lib/deploy-tick-invariant.sh
          test -f "$LIB" || {
            echo "::error::$LIB missing — W9 requires the deploy-tick invariant helper that carries the post-deploy daemon-recovery invariant (R4.b)"
            echo "  see: https://github.com/hamlet-archer/ai-ops-meta/blob/main/architect-backlog.md#w9"
            exit 1
          }
          # The puller must source the helper and call both surface functions.
          for sig in 'source_invariant_lib' 'deploy_tick_invariant__pre_state' 'deploy_tick_invariant__post'; do
            if ! grep -qF "$sig" scripts/pull-deploy.sh; then
              echo "::error file=scripts/pull-deploy.sh::W9 guard removed — pull-deploy.sh no longer wires '$sig' from the deploy-tick invariant helper"
              echo "  rationale: the helper carries the post-deploy daemon-recovery invariant (R4.b); without the wiring the recovery never fires and a deploy that leaves the daemon dead stays dead until the next code-change tick."
              echo "  see: https://github.com/hamlet-archer/ai-ops-meta/blob/main/architect-backlog.md#w9"
              exit 1
            fi
          done
          # The helper must keep its one-shot recovery + post-start verification.
          if ! grep -qE 'reset-failed' "$LIB"; then
            echo "::error file=$LIB::W9 guard removed — helper no longer runs 'systemctl reset-failed' before the recovery start"
            echo "  rationale: a failed unit must be reset before start, or the recovery start is a no-op."
            exit 1
          fi
          if ! grep -qF 'start returned 0 but ActiveState=' "$LIB"; then
            echo "::error file=$LIB::W9 guard removed — helper no longer verifies the unit actually came up after start"
            echo "  rationale: systemctl start returns 0 the moment ExecStartPre queues; without the post-start ActiveState check a unit that crashes in ExecStart slips through as 'recovered'."
            exit 1
          fi
          echo "W9 guard verified: deploy-tick-invariant.sh present + wired into pull-deploy.sh + retains reset-failed + post-start ActiveState verification."

      - name: Smoke-test the deploy-tick invariant helper (W9)
        # "Better still, run a smoke script instead of pure grep" (codex W9).
        # The helper ships a hermetic SMOKE harness (stub systemctl + sudo
        # passthrough) covering its three behavioural cases: deploy-ok no-op,
        # inactive-pre-state no-op, and active->dead recovery. Running it here
        # turns a structural grep into an executable guard.
        run: SMOKE=1 bash scripts/lib/deploy-tick-invariant.sh
